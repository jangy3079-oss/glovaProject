spring.application.name=GlobarProject
server.port=8080

# ==========================================
#  [1] 로컬 개발 환경 (현재 활성화됨)
# ==========================================
#spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
# 👇 로컬용 DB (globar_local)로 연결
#spring.datasource.url=jdbc:mysql://localhost:3306/globar_local?serverTimezone=Asia/Seoul&characterEncoding=UTF-8
#spring.datasource.username=root
#spring.datasource.password=${DB_PASSWORD}

# ==========================================
  [2] 실제 웹앱 환경 (주석 처리됨 - 나중에 쓸 때 주석 풀기)
# ==========================================
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.url=jdbc:mysql://localhost:3306/globar_db?serverTimezone=Asia/Seoul
spring.datasource.username=root
spring.datasource.password=${DB_PASSWORD}


# ------------------------------------------
#  공통 설정
# ------------------------------------------

# SQL Logging (운영 환경에서는 WARN 이상만 기록)
# 수정: 운영 환경에서 DB 쿼리 구조 노출 방지 - 로컬 개발 시에는 application-local.properties에서 DEBUG로 재설정
logging.level.org.hibernate.SQL=WARN

# JWT 설정
# 수정: 평문 fallback 시크릿 제거 - 환경변수 JWT_SECRET 필수 설정 필요
jwt.secret=${JWT_SECRET}
jwt.expiration=604800000

# 세션 유지 시간 (30일)
server.servlet.session.timeout=30d

# 쿠키 유효 시간 (30일 = 2592000초)
server.servlet.session.cookie.max-age=2592000s