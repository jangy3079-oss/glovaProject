<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <link rel="apple-touch-icon" href="/icon.png">
    <link rel="icon" href="/icon.png">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="mobile-web-app-capable" content="yes">
    <link rel="manifest" href="/manifest.json">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Globar - 회원가입</title>
    <style>
        :root {
            --toss-blue: #aed630;
            --toss-blue-press: #84cc16;
            --text-black: #191f28;
            --text-grey: #4e5968;
            --text-light: #8b95a1;
            --input-bg: #F9FBFA;
            --bg-color: #ffffff;
            --line-color: #F9FBFA;
        }

        body {
            font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, system-ui, Roboto, sans-serif;
            background-color: #e5e8eb;
            margin: 0;
            display: flex;
            justify-content: center;
        }

        /* 앱 프레임 컨테이너 */
        .app-container {
            width: 100%;
            max-width: 430px;
            min-height: 100vh;
            background-color: var(--bg-color);
            position: relative;
            box-shadow: 0 0 30px rgba(0,0,0,0.05);
            display: flex;
            flex-direction: column;
            padding-bottom: 90px;
        }

        /* 헤더: 뒤로가기 버튼만 심플하게 */
        header {
            padding: 10px 20px;
            background: #fff;
            position: sticky;
            top: 0;
            z-index: 10;
            height: 50px;
            display: flex;
            align-items: center;
        }

        .back-btn {
            font-size: 20px;
            color: var(--text-black);
            text-decoration: none;
            padding: 5px;
            cursor: pointer;
        }

        /* 콘텐츠 래퍼 */
        .content {
            padding: 10px 24px 40px;
            flex: 1;
        }

        /* 타이틀 영역 */
        .title-section {
            margin-bottom: 40px;
        }

        .page-title {
            font-size: 26px;
            font-weight: 800;
            color: var(--text-black);
            margin: 0 0 10px 0;
            line-height: 1.3;
        }

        .page-subtitle {
            font-size: 15px;
            color: var(--text-grey);
            line-height: 1.5;
        }

        /* 폼 스타일 */
        .form-group {
            margin-bottom: 24px;
        }

        label {
            display: block;
            font-size: 14px;
            font-weight: 600;
            color: var(--text-grey);
            margin-bottom: 8px;
            margin-left: 4px;
        }

        /* 토스 스타일 입력창: 채워진 회색 박스 */
        input[type="text"],
        input[type="password"],
        select,
        textarea {
            width: 100%;
            padding: 16px;
            border: none;
            border-radius: 16px;
            background-color: var(--input-bg);
            font-size: 16px;
            color: var(--text-black);
            box-sizing: border-box;
            font-family: inherit;
            transition: background-color 0.2s;
            appearance: none;
            -webkit-appearance: none;
        }

        input::placeholder, textarea::placeholder {
            color: var(--text-light);
        }

        input:focus, select:focus, textarea:focus {
            outline: none;
            background-color: #e8ebed;
        }

        textarea {
            resize: none;
            min-height: 120px;
            line-height: 1.5;
        }

        /* 버튼 그룹 */
        .btn-submit {
            width: 100%;
            padding: 18px;
            background-color: var(--toss-blue);
            color: white;
            border: none;
            border-radius: 16px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            margin-top: 20px;
            transition: background-color 0.2s;
        }

        .btn-submit:active {
            background-color: var(--toss-blue-press);
        }

        /* 하단 링크 */
        .footer-links {
            margin-top: 30px;
            text-align: center;
            font-size: 14px;
            color: var(--text-light);
        }

        .footer-links a {
            color: var(--text-grey);
            text-decoration: none;
            font-weight: 600;
            margin-left: 5px;
            border-bottom: 1px solid transparent;
        }

        .footer-links a:hover {
            border-bottom: 1px solid var(--text-grey);
        }

        /* 하단 네비게이션 */
        .bottom-nav {
            position: fixed;
            bottom: 0;
            width: 100%;
            max-width: 430px;
            height: 70px;
            background: white;
            border-top: 1px solid var(--line-color);
            display: flex;
            justify-content: space-around;
            align-items: center;
            z-index: 1000;
        }

        .nav-item {
            text-decoration: none;
            color: #b0b8c1;
            font-size: 10px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
        }

        .nav-icon { font-size: 20px; }
    </style>
</head>
<body>

    <div class="app-container">
        <header>
            <a href="javascript:history.back()" class="back-btn">❮</a>
        </header>

        <div class="content">
            <div class="title-section">
                <h1 class="page-title">환영합니다!<br>회원 정보를 입력해주세요</h1>
                <div class="page-subtitle">글로바의 멤버가 되어<br>다양한 언어교환 모임에 참여해 보세요.</div>
            </div>

            <form action="/Globar/register" method="post">
                
                <div class="form-group">
                    <label for="username">아이디</label>
                    <input type="text" id="username" name="username" placeholder="사용할 아이디" required>
                </div>

                <div class="form-group">
                    <label for="password">비밀번호</label>
                    <input type="password" id="password" name="password" placeholder="비밀번호" required>
                </div>

                <div class="form-group">
                    <label for="nickname">닉네임</label>
                    <input type="text" id="nickname" name="nickname" placeholder="화면에 표시될 이름" required>
                </div>

                <div class="form-group">
                    <label for="language">관심 언어</label>
                    <input type="text" id="language" name="language" placeholder="예: 한국어, 영어, 일본어">
                </div>

                <div class="form-group">
                    <label for="level">현재 어학 실력</label>
                    <select id="level" name="level" required style="background-image: url('data:image/svg+xml;charset=US-ASCII,%3Csvg%20xmlns%3D%22http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg%22%20width%3D%22292.4%22%20height%3D%22292.4%22%3E%3Cpath%20fill%3D%22%238b95a1%22%20d%3D%22M287%2069.4a17.6%2017.6%200%200%200-13-5.4H18.4c-5%200-9.3%201.8-12.9%205.4A17.6%2017.6%200%200%200%200%2082.2c0%205%201.8%209.3%205.4%2012.9l128%20127.9c3.6%203.6%207.8%205.4%2012.8%205.4s9.2-1.8%2012.8-5.4L287%2095c3.5-3.5%205.4-7.8%205.4-12.8%200-5-1.9-9.2-5.5-12.8z%22%2F%3E%3C%2Fsvg%3E'); background-repeat: no-repeat; background-position: right 16px top 50%; background-size: 12px auto;">
                        <option value="" disabled selected>본인의 실력을 선택해주세요</option>
                        <option value="초급">초급 (기초 단어/인사 가능)</option>
                        <option value="중급">중급 (일상 대화 가능)</option>
                        <option value="고급">고급 (원어민 수준/유창함)</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="bio">자기소개</label>
                    <textarea id="bio" name="bio" placeholder="자신을 짧게 소개해 주세요."></textarea>
                </div>

                <button type="submit" class="btn-submit">가입하기</button>

            </form>

            <div class="footer-links">
                이미 계정이 있으신가요? <a href="/Globar/login">로그인</a>
            </div>
        </div>

        <nav class="bottom-nav">
            <a href="/Globar/home" class="nav-item">
                <span class="nav-icon">🏠</span><span>홈</span>
            </a>
            <a href="/Globar/community" class="nav-item">
                <span class="nav-icon">💬</span><span>커뮤니티</span>
            </a>
            <a href="/Globar/calendar" class="nav-item">
                <span class="nav-icon">📅</span><span>캘린더</span>
            </a>
            <a href="/Globar/mypage" class="nav-item">
                <span class="nav-icon">👤</span><span>마이</span>
            </a>
        </nav>
    </div>

</body>
</html>
