<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
	<link rel="apple-touch-icon" href="/icon.png">

	<link rel="icon" href="/icon.png">
	<meta name="apple-mobile-web-app-capable" content="yes">
	<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
	<meta name="mobile-web-app-capable" content="yes">
	<link rel="manifest" href="/manifest.json">
	
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Globar - 활동 상세정보</title>
    <style>
        :root {
            --toss-blue: #aed630;
            --toss-blue-press: #84cc16;
            --text-black: #191f28;
            --text-grey: #4e5968;
            --text-light: #8b95a1;
            --bg-color: #ffffff;
            --line-color: #F9FBFA;
            --danger-color: #ff4757;
            --success-color: #2ecc71; /* 출석체크용 초록색 */
            --admin-dark: #34495e;    /* 관리자용 짙은 색 */
        }

        body {
            font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, system-ui, Roboto, sans-serif;
            background-color: #e5e8eb;
            margin: 0;
            display: flex;
            justify-content: center;
        }

        .app-container {
            width: 100%;
            max-width: 430px;
            min-height: 100vh;
            background-color: var(--bg-color);
            position: relative;
            box-shadow: 0 0 30px rgba(0,0,0,0.05);
            display: flex;
            flex-direction: column;
            padding-bottom: 90px;
        }

        header {
            padding: 15px 20px;
            background: #fff;
            position: sticky;
            top: 0;
            z-index: 10;
            display: flex;
            align-items: center;
        }

        .back-btn {
            font-size: 20px;
            color: var(--text-black);
            text-decoration: none;
            padding: 5px;
            cursor: pointer;
        }

        .content {
            padding: 10px 24px 120px; /* 하단 버튼 영역 확보 */
            flex: 1;
        }

        .author-section {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 16px;
        }

        .avatar-circle {
            width: 44px;
            height: 44px;
            background-color: #F9FBFA;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 20px;
            color: var(--text-grey);
        }

        .author-info {
            display: flex;
            flex-direction: column;
        }

        .author-name {
            font-size: 15px;
            font-weight: 700;
            color: var(--text-black);
        }

        .author-badge {
            font-size: 12px;
            color: var(--text-light);
            margin-top: 2px;
        }

        .activity-title {
            font-size: 24px;
            font-weight: 800;
            color: var(--text-black);
            line-height: 1.35;
            margin: 0 0 24px 0;
            word-break: keep-all;
        }

        .info-card {
            background-color: #F9FBFA;
            border-radius: 20px;
            padding: 24px;
            margin-bottom: 30px;
        }

        .info-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 14px;
        }

        .info-row:last-child { margin-bottom: 0; }

        .info-label {
            font-size: 14px;
            color: var(--text-grey);
            font-weight: 500;
        }

        .info-value {
            font-size: 15px;
            color: var(--text-black);
            font-weight: 700;
            text-align: right;
        }

        .desc-section {
            margin-bottom: 40px;
        }

        .section-header {
            font-size: 18px;
            font-weight: 700;
            color: var(--text-black);
            margin-bottom: 12px;
        }

        .desc-text {
            font-size: 16px;
            line-height: 1.6;
            color: var(--text-grey);
            white-space: pre-wrap;
        }

        /* 하단 고정 액션 바 */
        .bottom-action-bar {
            position: fixed;
            bottom: 70px;
            left: 50%;
            transform: translateX(-50%);
            width: 100%;
            max-width: 430px;
            padding: 16px 24px;
            box-sizing: border-box;
            background: linear-gradient(to top, rgba(255,255,255,1) 85%, rgba(255,255,255,0));
            z-index: 20;
            pointer-events: none;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        /* [수정] 관리자 버튼 가로 배치용 컨테이너 */
        .admin-btn-row {
            display: flex;
            gap: 10px;
            width: 100%;
            pointer-events: auto; /* 버튼 클릭 가능하도록 */
        }

        .admin-btn-row > form,
        .admin-btn-row > a {
            flex: 1; /* 1:1 비율 */
            margin: 0;
        }

        /* 공통 버튼 스타일 */
        .btn-action {
            width: 100%;
            padding: 16px 10px; /* 텍스트 공간 확보를 위해 패딩 조정 */
            border: none;
            border-radius: 16px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            pointer-events: auto;
            transition: transform 0.1s;
            text-align: center;
            text-decoration: none;
            display: block;
            white-space: nowrap; /* 줄바꿈 방지 */
        }

        .btn-action:active { transform: scale(0.98); }

        .btn-blue { background-color: var(--toss-blue); color: white; }
        .btn-green { background-color: var(--success-color); color: white; }
        .btn-dark { background-color: var(--admin-dark); color: white; }
        .btn-gray { background-color: #d1d6db; color: white; cursor: not-allowed; }
        .btn-disabled-processing { background-color: #b0b8c1; color: white; cursor: wait; }

        /* 하단 네비게이션 */
        .bottom-nav {
            position: fixed;
            bottom: 0;
            width: 100%;
            max-width: 430px;
            height: 70px;
            background: white;
            border-top: 1px solid var(--line-color);
            display: flex;
            justify-content: space-around;
            align-items: center;
            z-index: 1000;
        }

        .nav-item {
            text-decoration: none;
            color: #b0b8c1;
            font-size: 10px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
        }

        .nav-item.active { color: var(--text-black); font-weight: 700; }
        .nav-icon { font-size: 20px; }
    </style>
</head>
<body>

<div class="app-container">
    <header>
        <a href="/Globar/calendar" class="back-btn">❮</a>
    </header>

    <div class="content">
        <section th:if="${activity != null}">
            <div class="author-section">
                <div class="avatar-circle">👤</div>
                <div class="author-info">
                    <span class="author-name">관리자</span>
                    <span class="author-badge" th:text="${activity.location}">Location</span>
                </div>
            </div>

            <h1 class="activity-title" th:text="${activity.title}">활동 제목</h1>

            <div class="info-card">
                <div class="info-row">
                    <span class="info-label">날짜</span>
                    <span class="info-value" th:text="${#temporals.format(activity.eventDate, 'M월 d일 (E)')}">날짜</span>
                </div>
                <div class="info-row">
                    <span class="info-label">시간</span>
                    <span class="info-value" th:text="${#temporals.format(activity.eventDate, 'a h:mm')}">시간</span>
                </div>
                <div class="info-row">
                    <span class="info-label">장소</span>
                    <span class="info-value" th:text="${activity.location}">장소</span>
                </div>
                <div class="info-row">
                    <span class="info-label">참여 인원</span>
                    <span class="info-value">
                        <span style="color:var(--toss-blue)" th:text="${activity.currentParticipants}">0</span>
                        / <span th:text="${activity.maxParticipants}">20</span>명
                    </span>
                </div>
            </div>

            <div class="desc-section">
                <div class="section-header">모임 소개</div>
                <div class="desc-text" th:text="${activity.description}">
                    상세 설명이 없습니다.
                </div>
            </div>

            <div class="bottom-action-bar">
                
                <div th:if="${session.loginUser.role != 'ADMIN'}">
                    <form th:if="${activity.currentParticipants < activity.maxParticipants}" 
                          action="/Globar/calendar/apply" method="post"
                          onsubmit="return preventDoubleSubmit(this);">
                        <input type="hidden" name="actNum" th:value="${activity.actNum}">
                        <button type="submit" class="btn-action btn-blue">참여하기</button>
                    </form>
                    
                    <button th:unless="${activity.currentParticipants < activity.maxParticipants}" 
                            type="button" class="btn-action btn-gray">
                        정원이 꽉 찼어요
                    </button>
                </div>

                <div th:if="${session.loginUser.role == 'ADMIN'}" class="admin-btn-row">
                    <form action="/Globar/attendance" method="post" onsubmit="return preventDoubleSubmit(this);">
                        <input type="hidden" name="actNum" th:value="${activity.actNum}">
                        <button type="submit" class="btn-action btn-green">✅ 활동신청</button>
                    </form>

                    <a th:href="@{/Globar/admin/attendance/{n}(n=${activity.actNum})}" class="btn-action btn-dark">
                        📋 명단 관리
                    </a>
                </div>

            </div>
        </section>

        <section th:unless="${activity != null}" style="text-align:center; padding-top:100px;">
            <p style="color:#999;">존재하지 않는 활동입니다.</p>
        </section>
    </div>

    <nav class="bottom-nav">
        <a href="/Globar/home" class="nav-item">
            <span class="nav-icon">🏠</span><span>홈</span>
        </a>
        <a href="/Globar/community" class="nav-item">
            <span class="nav-icon">💬</span><span>커뮤니티</span>
        </a>
        <a href="/Globar/calendar" class="nav-item active">
            <span class="nav-icon">📅</span><span>캘린더</span>
        </a>
        <a href="/Globar/mypage" class="nav-item">
            <span class="nav-icon">👤</span><span>마이</span>
        </a>
    </nav>
</div>

<script>
    function preventDoubleSubmit(form) {
        var btn = form.querySelector('button[type="submit"]');
        if (btn) {
            btn.disabled = true;
            btn.innerText = '처리중..';
            btn.classList.add('btn-disabled-processing');
        }
        return true;
    }
</script>

</body>
</html>
