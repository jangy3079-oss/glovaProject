<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
	<link rel="apple-touch-icon" href="/icon.png">

	<link rel="icon" href="/icon.png">
	<meta name="apple-mobile-web-app-capable" content="yes">
	<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
	<meta name="mobile-web-app-capable" content="yes">
	<link rel="manifest" href="/manifest.json">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Globar Calendar</title>
    <style>
        /* 1. 기본 설정 */
        :root {
            --toss-blue: #aed630;
            --text-black: #191f28;
            --text-grey: #8b95a1;
            --bg-color: #ffffff;
            --line-color: #F9FBFA;
            --danger: #ef4444;
            --sat-blue: #3b82f6;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, system-ui, Roboto, sans-serif;
            background-color: #e5e8eb;
            display: flex;
            justify-content: center;
            height: 100vh; /* 화면 전체 높이 사용 */
            overflow: hidden; /* 스크롤 방지 */
        }

        /* 2. 앱 프레임 (Flex Column 구조) */
        .app-container {
            width: 100%;
            max-width: 430px;
            height: 100%;
            background-color: var(--bg-color);
            display: flex;
            flex-direction: column; /* 세로 배치 */
            position: relative;
            box-shadow: 0 0 40px rgba(0,0,0,0.05);
        }

        /* 3. 헤더 */
        .header {
            padding: 15px 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-shrink: 0; /* 크기 고정 */
        }

        .month-title {
            font-size: 22px;
            font-weight: 800;
            color: var(--text-black);
            margin: 0;
        }

        .nav-arrow {
            font-size: 18px;
            padding: 10px;
            cursor: pointer;
            color: var(--text-black);
        }

        /* 4. 요일 헤더 */
        .days-header {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            text-align: center;
            padding: 10px 0;
            border-bottom: 1px solid var(--line-color);
            flex-shrink: 0; /* 크기 고정 */
        }

        .day-name {
            font-size: 12px;
            color: var(--text-grey);
            font-weight: 600;
        }

        /* 5. 캘린더 그리드 (핵심 수정: Flex Grow & 6줄 고정) */
        .calendar-body {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            /* 화면 남은 공간을 6등분하여 꽉 채움 */
            grid-template-rows: repeat(6, 1fr); 
            flex: 1; /* 남은 공간 모두 차지 */
            width: 100%;
            padding: 0;
            /* 스크롤 제거 */
            overflow: hidden; 
        }

        .date-cell {
            border-bottom: 1px solid var(--line-color); /* 가로선 */
            border-right: 1px solid transparent; /* 세로선 제거 (깔끔하게) */
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            padding-top: 8px;
            position: relative;
            box-sizing: border-box;
        }

        .date-num {
            font-size: 14px;
            font-weight: 500;
            color: var(--text-black);
            width: 24px;
            height: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            margin-bottom: 4px;
            z-index: 2;
        }

        /* 오늘 날짜 */
        .today .date-num {
            background-color: var(--toss-blue);
            color: white;
            font-weight: 700;
        }

        /* 주말 색상 */
        .sun .date-num { color: var(--danger); }
        .sat .date-num { color: var(--sat-blue); }
        .today.sun .date-num, .today.sat .date-num { color: white; }

        /* 일정 캡슐 */
        .event-capsule {
            font-size: 9px;
            background-color: #F9FBFA;
            color: var(--text-black);
            padding: 3px 6px;
            border-radius: 4px;
            width: 85%;
            text-align: center;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            margin-top: 2px;
            font-weight: 600;
        }
        
        .event-capsule.highlight {
            background-color: rgba(49, 130, 246, 0.1);
            color: var(--toss-blue);
        }

        /* 6. 하단 네비게이션 (고정형이되 공간 차지) */
        .bottom-nav {
            height: 65px;
            background: #ffffff;
            border-top: 1px solid var(--line-color);
            display: flex;
            justify-content: space-around;
            align-items: center;
            flex-shrink: 0; /* 크기 줄어들지 않음 */
            z-index: 100;
        }

        .nav-item {
            text-decoration: none;
            color: #b0b8c1;
            font-size: 10px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
        }

        .nav-item.active { color: var(--text-black); font-weight: 700; }
        .nav-icon { font-size: 20px; }

        /* 7. 플로팅 버튼 */
        .fab {
            position: absolute;
            bottom: 80px; /* 네비게이션 바로 위에 위치 */
            right: 20px;
            background-color: var(--text-black);
            color: white;
            padding: 12px 18px;
            border-radius: 25px;
            font-weight: 700;
            font-size: 14px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            border: none;
            cursor: pointer;
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 5px;
            z-index: 50;
        }
    </style>
</head>
<body>

    <div class="app-container">
        <div class="header">
            <span class="nav-arrow" onclick="changeMonth(-1)">❮</span>
            <h2 id="monthDisplay" class="month-title"></h2>
            <span class="nav-arrow" onclick="changeMonth(1)">❯</span>
        </div>

        <div class="days-header">
            <span class="day-name" style="color:var(--danger)">일</span>
            <span class="day-name">월</span>
            <span class="day-name">화</span>
            <span class="day-name">수</span>
            <span class="day-name">목</span>
            <span class="day-name">금</span>
            <span class="day-name" style="color:var(--sat-blue)">토</span>
        </div>

        <div id="calendarBody" class="calendar-body"></div>

        <a th:if="${session.loginUser != null && session.loginUser.role == 'ADMIN'}" 
           href="/Globar/calendar/write" class="fab">
           + 일정 추가
        </a>

        <nav class="bottom-nav">
            <a href="/Globar/home" class="nav-item">
                <span class="nav-icon">🏠</span>홈
            </a>
            <a href="/Globar/community" class="nav-item">
                <span class="nav-icon">💬</span>커뮤니티
            </a>
            <a href="/Globar/calendar" class="nav-item active">
                <span class="nav-icon">📅</span>캘린더
            </a>
            <a href="/Globar/mypage" class="nav-item">
                <span class="nav-icon">👤</span>마이
            </a>
        </nav>
    </div>

    <script th:inline="javascript">
        /*<![CDATA[*/
        const activities = /*[[${activities}]]*/ [];
        /*]]>*/

        let currentViewDate = new Date();

        function renderCalendar() {
            const body = document.getElementById('calendarBody');
            const monthDisplay = document.getElementById('monthDisplay');
            if(!body) return;

            body.innerHTML = '';
            const year = currentViewDate.getFullYear();
            const month = currentViewDate.getMonth();
            const today = new Date();
            
            monthDisplay.innerText = `${year}년 ${month + 1}월`;
            
            const firstDay = new Date(year, month, 1).getDay();
            const lastDate = new Date(year, month + 1, 0).getDate();

            // 1. 앞쪽 빈칸 채우기
            for (let i = 0; i < firstDay; i++) {
                const empty = document.createElement('div');
                empty.className = 'date-cell';
                body.appendChild(empty);
            }

            // 2. 날짜 채우기
            for (let d = 1; d <= lastDate; d++) {
                const cell = document.createElement('div');
                cell.className = 'date-cell';
                
                if(year === today.getFullYear() && month === today.getMonth() && d === today.getDate()) {
                    cell.classList.add('today');
                }

                const dayOfWeek = new Date(year, month, d).getDay();
                if(dayOfWeek === 0) cell.classList.add('sun');
                if(dayOfWeek === 6) cell.classList.add('sat');

                const num = document.createElement('div');
                num.className = 'date-num';
                num.innerText = d;
                cell.appendChild(num);

                // 일정 매핑
                const currentStr = `${year}-${String(month + 1).padStart(2, '0')}-${String(d).padStart(2, '0')}`;
                if (activities && Array.isArray(activities)) {
                    activities.forEach(act => {
                        if (!act || !act.eventDate) return;
                        let actDateStr = "";
                        try {
                            const ed = act.eventDate;
                            if (typeof ed === 'object' && !Array.isArray(ed)) {
                                const y = ed.year;
                                const m = String(ed.monthValue || ed.month).padStart(2, '0');
                                const day = String(ed.dayOfMonth).padStart(2, '0');
                                actDateStr = `${y}-${m}-${day}`;
                            } else if (Array.isArray(ed)) {
                                actDateStr = `${ed[0]}-${String(ed[1]).padStart(2, '0')}-${String(ed[2]).padStart(2, '0')}`;
                            } else {
                                actDateStr = ed.split('T')[0];
                            }
                        } catch(e) { return; }

                        if(actDateStr === currentStr) {
                            const badge = document.createElement('div');
                            badge.className = 'event-capsule highlight';
                            badge.innerText = act.title || "일정";
                            badge.onclick = (e) => {
                                e.stopPropagation();
                                location.href = `/Globar/calendar/${act.actNum}`;
                            };
                            cell.appendChild(badge);
                        }
                    });
                }
                body.appendChild(cell);
            }

            // 3. 남은 칸 채우기 (항상 6주 = 42칸 유지)
            // 이를 통해 달력 높이가 일정하게 유지되어 화면에 딱 맞게 됨
            const totalCellsFilled = firstDay + lastDate;
            const totalSlots = 42; // 6 rows * 7 cols
            for (let i = totalCellsFilled; i < totalSlots; i++) {
                const empty = document.createElement('div');
                empty.className = 'date-cell';
                body.appendChild(empty);
            }
        }

        function changeMonth(offset) {
            currentViewDate.setMonth(currentViewDate.getMonth() + offset);
            renderCalendar();
        }
        document.addEventListener('DOMContentLoaded', renderCalendar);
    </script>
</body>
</html>
