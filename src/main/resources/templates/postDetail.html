<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
	<link rel="apple-touch-icon" href="/icon.png">

	<link rel="icon" href="/icon.png">
	<meta name="apple-mobile-web-app-capable" content="yes">
	<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
	<meta name="mobile-web-app-capable" content="yes">
	<link rel="manifest" href="/manifest.json">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Globar - 게시글 상세</title>
    <style>
        :root {
            --toss-blue: #aed630;
            --text-black: #191f28;      /* 제목용 */
            --text-grey: #4e5968;       /* 본문용 */
            --text-light: #8b95a1;      /* 날짜 등 보조 텍스트 */
            --bg-color: #ffffff;
            --line-color: #F9FBFA;      /* 구분선 */
            --danger-color: #ff4757;    /* 삭제/공지 색상 */
            --btn-gray-bg: #F9FBFA;     /* 회색 버튼 배경 */
            --input-bg: #F9FBFA;        /* 입력창 배경 */
        }

        body {
            font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, system-ui, Roboto, sans-serif;
            background-color: #e5e8eb; /* 데스크탑 배경 */
            margin: 0;
            display: flex;
            justify-content: center;
        }

        /* 앱 프레임 컨테이너 */
        .app-container {
            width: 100%;
            max-width: 430px;
            min-height: 100vh;
            background-color: var(--bg-color);
            position: relative;
            box-shadow: 0 0 30px rgba(0,0,0,0.05);
            display: flex;
            flex-direction: column;
            padding-bottom: 90px;
        }

        /* 헤더: 뒤로가기 버튼 포함 */
        header {
            padding: 15px 20px;
            background: #fff;
            position: sticky;
            top: 0;
            z-index: 10;
            display: flex;
            align-items: center;
            border-bottom: 1px solid var(--line-color);
        }

        .back-btn {
            font-size: 20px;
            color: var(--text-black);
            text-decoration: none;
            margin-right: 15px;
            padding: 5px;
            cursor: pointer;
        }

        .header-title {
            font-size: 18px;
            font-weight: 700;
            color: var(--text-black);
        }

        /* 콘텐츠 래퍼 */
        .content {
            padding: 24px;
            flex: 1;
        }

        /* 게시글 제목 영역 */
        .post-header-section {
            margin-bottom: 24px;
        }

        .notice-badge {
            display: inline-block;
            background-color: #fff1f1;
            color: var(--danger-color);
            font-size: 12px;
            font-weight: 700;
            padding: 4px 8px;
            border-radius: 6px;
            margin-bottom: 10px;
        }

        .post-title {
            font-size: 22px;
            font-weight: 800;
            color: var(--text-black);
            line-height: 1.4;
            margin: 0 0 16px 0;
            word-break: keep-all;
        }

        /* 작성자 프로필 영역 */
        .author-row {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .avatar-placeholder {
            width: 40px;
            height: 40px;
            background-color: #F9FBFA;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 20px;
        }

        .author-info {
            display: flex;
            flex-direction: column;
        }

        .author-name {
            font-size: 15px;
            font-weight: 700;
            color: var(--text-black);
        }

        .post-date {
            font-size: 13px;
            color: var(--text-light);
            margin-top: 2px;
        }

        /* 구분선 */
        .divider {
            height: 1px;
            background-color: var(--line-color);
            border: none;
            margin: 24px 0;
        }

        /* 본문 */
        .post-body {
            font-size: 16px;
            line-height: 1.7;
            color: var(--text-black);
            white-space: pre-wrap;
            word-wrap: break-word;
            min-height: 150px;
        }

        /* --- 댓글 스타일 (추가됨) --- */
        .reply-section {
            margin-top: 40px;
            margin-bottom: 20px;
        }

        .reply-header {
            font-size: 16px;
            font-weight: 700;
            color: var(--text-black);
            margin-bottom: 16px;
        }

        .reply-list {
            display: flex;
            flex-direction: column;
            gap: 20px;
            margin-bottom: 24px;
        }

        .reply-item {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .reply-meta {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 13px;
        }

        .reply-author {
            font-weight: 700;
            color: var(--text-black);
        }

        .reply-time {
            color: var(--text-light);
            font-size: 12px;
        }

        .reply-text {
            font-size: 15px;
            color: var(--text-grey);
            line-height: 1.5;
            background-color: #F9FBFA; /* 연한 회색 박스 */
            padding: 12px;
            border-radius: 12px;
        }

        /* 댓글 입력폼 */
        .reply-form-wrapper {
            background-color: var(--bg-color);
            padding-top: 10px;
        }

        .reply-form {
            display: flex;
            gap: 8px;
        }

        .reply-input {
            flex: 1;
            background-color: var(--input-bg);
            border: none;
            border-radius: 20px;
            padding: 14px 16px;
            font-size: 15px;
            color: var(--text-black);
            outline: none;
        }

        .reply-input::placeholder {
            color: var(--text-light);
        }

        .btn-reply-submit {
            background-color: var(--toss-blue);
            color: white;
            border: none;
            border-radius: 16px;
            padding: 0 16px;
            font-weight: 700;
            font-size: 14px;
            cursor: pointer;
            white-space: nowrap;
        }

        /* 하단 버튼 그룹 */
        .action-buttons {
            margin-top: 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-top: 1px solid var(--line-color);
            padding-top: 20px;
        }

        .btn-gray {
            background-color: var(--btn-gray-bg);
            color: var(--text-grey);
            padding: 12px 20px;
            border-radius: 12px;
            text-decoration: none;
            font-size: 14px;
            font-weight: 600;
            display: inline-flex;
            align-items: center;
            gap: 5px;
            transition: background 0.2s;
        }

        .btn-group-right {
            display: flex;
            gap: 8px;
        }

        .btn-danger-text {
            background-color: transparent;
            color: var(--text-light);
            padding: 12px 15px;
            font-size: 14px;
            font-weight: 500;
            text-decoration: none;
        }
        
        .btn-danger-text:hover { color: var(--danger-color); }

        .btn-primary-text {
            background-color: transparent;
            color: var(--toss-blue);
            padding: 12px 15px;
            font-size: 14px;
            font-weight: 600;
            text-decoration: none;
        }

        /* 하단 네비게이션 */
        .bottom-nav {
            position: fixed;
            bottom: 0;
            width: 100%;
            max-width: 430px;
            height: 70px;
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-top: 1px solid var(--line-color);
            display: flex;
            justify-content: space-around;
            align-items: center;
            z-index: 1000;
        }

        .nav-item {
            text-decoration: none;
            color: #b0b8c1;
            font-size: 10px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
        }

        .nav-item.active { color: var(--text-black); font-weight: 700; }
        .nav-icon { font-size: 20px; }
    </style>
</head>
<body>

<div class="app-container">
    <header>
        <a th:href="@{/Globar/community(category=${post.category})}" class="back-btn">❮</a>
        <span class="header-title">글 보기</span>
    </header>

    <div class="content">
        <div class="post-header-section">
            <span th:if="${post.isNotice}" class="notice-badge">공지</span>
            <h1 class="post-title" th:text="${post.title}">게시글 제목이 들어갑니다.</h1>
            
            <div class="author-row">
                <div class="avatar-placeholder">👤</div>
                <div class="author-info">
                    <span class="author-name" th:text="${post.authorName}">닉네임</span>
                    <span class="post-date" th:text="${#temporals.format(post.regDate, 'yyyy.MM.dd HH:mm')}">2025.12.31 15:30</span>
                </div>
            </div>
        </div>

        <hr class="divider">

        <div class="post-body" th:text="${post.content}">
            본문 내용이 여기에 표시됩니다.<br>
            줄바꿈과 띄어쓰기가 적용됩니다.
        </div>

        <hr class="divider" style="margin-top: 40px;">

        <div class="reply-section">
            <div class="reply-header">댓글 <span th:text="${replies != null ? replies.size() : 0}">0</span></div>

            <div class="reply-list">
                <div th:each="reply : ${replies}" class="reply-item">
                    <div class="reply-meta">
                        <span class="reply-author" th:text="${reply.authorId}">작성자</span>
                        <span class="reply-time" th:text="${#temporals.format(reply.regDate, 'MM.dd HH:mm')}">날짜</span>
                    </div>
                    <div class="reply-text" th:text="${reply.content}">댓글 내용</div>
                </div>
                
                <div th:if="${replies == null or #lists.isEmpty(replies)}" style="text-align: center; color: #b0b8c1; font-size: 14px; padding: 10px;">
                    첫 댓글을 남겨보세요! 👋
                </div>
            </div>

            <div class="reply-form-wrapper">
                <form action="/Globar/community/reply/write" method="post" class="reply-form">
                    <input type="hidden" name="postNum" th:value="${post.postNum}">
                    <input type="text" name="content" class="reply-input" placeholder="댓글을 입력하세요" required autocomplete="off">
                    <button type="submit" class="btn-reply-submit">등록</button>
                </form>
            </div>
        </div>

        <div class="action-buttons">
            <a th:href="@{/Globar/community(category=${post.category})}" class="btn-gray">목록</a>
            
            <div class="btn-group-right" 
                 th:if="${session.loginUser != null && (session.loginUser.userId == post.authorId || session.loginUser.role == 'ADMIN')}">
                <a th:href="@{/Globar/community/edit/{n}(n=${post.postNum})}" class="btn-primary-text">수정</a>
                <a th:href="@{/Globar/community/delete/{n}(n=${post.postNum})}" class="btn-danger-text" onclick="return confirm('정말 삭제하시겠습니까?')">삭제</a>
            </div>
        </div>
    </div>

    <nav class="bottom-nav">
        <a href="/Globar/home" class="nav-item">
            <span class="nav-icon">🏠</span>
            <span>홈</span>
        </a>
        <a href="/Globar/community" class="nav-item active">
            <span class="nav-icon">💬</span>
            <span>커뮤니티</span>
        </a>
        <a href="/Globar/calendar" class="nav-item">
            <span class="nav-icon">📅</span>
            <span>캘린더</span>
        </a>
        <a href="/Globar/mypage" class="nav-item">
            <span class="nav-icon">👤</span>
            <span>마이</span>
        </a>
    </nav>
</div>

</body>
</html>
